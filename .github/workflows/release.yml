name: macOS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@cc4f6536e38d1126c5e3b0683d469a14f23bfea4 # v3.1.5
        with:
          fail-on-severity: high
      - run: pnpm audit --audit-level=high
      - run: pnpm verify

  release:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json contains an invalid release version: $version" >&2
            exit 1
          fi
          tag="v$version"
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" >/dev/null 2>&1 ||
             gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Tag or release $tag already exists." >&2
            exit 1
          fi
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Build release candidate
        run: pnpm make

      - name: Smoke-test release candidate
        run: pnpm test:packaged

      - name: Verify code signature
        run: |
          app="$(find out -name 'Guild Wars.app' -type d -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          signature="$(codesign -dv --verbose=4 "$app" 2>&1)"
          echo "$signature"
          echo "$signature" | grep -E "Signature=adhoc|TeamIdentifier=not set"

      - name: Prepare release assets
        id: assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          asset_count="$(find out/make -type f -name '*.zip' | wc -l | tr -d ' ')"
          if [ "$asset_count" != "1" ]; then
            echo "Expected exactly one ZIP, found $asset_count." >&2
            exit 1
          fi
          asset="$(find out/make -type f -name '*.zip' -print -quit)"
          asset_dir="$(dirname "$asset")"
          app="$(find out -name 'Guild Wars.app' -type d -print -quit)"
          test -n "$app"
          sbom="$asset_dir/Guild-Wars-$VERSION-macOS-arm64.spdx.json"
          checksum="$asset_dir/SHA256SUMS.txt"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "sbom=$sbom" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ steps.assets.outputs.app }}
          format: spdx-json
          output-file: ${{ steps.assets.outputs.sbom }}
          upload-artifact: false
          upload-release-assets: false

      - name: Finalize release checksums
        env:
          ASSET: ${{ steps.assets.outputs.asset }}
          CHECKSUM: ${{ steps.assets.outputs.checksum }}
          SBOM: ${{ steps.assets.outputs.sbom }}
        run: |
          asset_dir="$(dirname "$ASSET")"
          (
            cd "$asset_dir"
            shasum -a 256 "$(basename "$ASSET")" "$(basename "$SBOM")" \
              > "$(basename "$CHECKSUM")"
            shasum -a 256 -c "$(basename "$CHECKSUM")"
          )

      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.assets.outputs.asset }}

      - name: Attest release SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.assets.outputs.asset }}
          sbom-path: ${{ steps.assets.outputs.sbom }}

      - name: Publish GitHub prerelease
        env:
          ASSET: ${{ steps.assets.outputs.asset }}
          CHECKSUM: ${{ steps.assets.outputs.checksum }}
          SBOM: ${{ steps.assets.outputs.sbom }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          notes="> [!WARNING]
          > This is an alpha build. Back up important data and expect bugs."
          release_args=(--target "$GITHUB_SHA" --title "$TAG")
          if [ "$PRERELEASE" = "true" ]; then
            release_args+=(--prerelease --latest=false)
          fi
          notes="$notes

          > [!NOTE]
          > This build is ad-hoc signed, not notarized by Apple. macOS blocks the
          > first launch; follow the install guide for the one-time per-app
          > approval. Do not disable Gatekeeper."
          notes="$notes

          Every release includes SHA-256 checksums, an SPDX SBOM, and GitHub
          build/SBOM attestations. See the install guide for verification."
          gh release create "$TAG" "$ASSET" "$CHECKSUM" "$SBOM" \
            "${release_args[@]}" \
            --generate-notes \
            --notes "$notes"
